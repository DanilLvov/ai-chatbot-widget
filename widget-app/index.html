<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant</title>
    <style>
      body {
        width: 260px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #1a1a2e;
      }

      h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #6c63ff;
      }

      p {
        font-size: 13px;
        color: #666;
        line-height: 1.5;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 12px;
        font-size: 13px;
        color: #444;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <h2>AI Chat Assistant</h2>
    <p>The chat widget is active on this page. Click the 💬 button in the bottom-right corner to start chatting.</p>
    <div class="status">
      <div class="dot"></div>
      Extension active
    </div>
  </body>
</html>
